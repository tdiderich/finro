  - type: section
    eyebrow: Neutral
    heading: Base themes
    components:
      - type: markdown
        body: |
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;">
            <div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.07);border-radius:12px;overflow:hidden;">
              <div style="height:64px;background:#899878;"></div>
              <div style="padding:14px 16px;">
                <div style="font-size:15px;font-weight:600;color:#F7F7F2;margin-bottom:4px;">dark</div>
                <div style="font-family:'SF Mono',monospace;font-size:12px;color:#B0B3AD;">#899878 · sage accent on #121113</div>
                <code style="display:inline-block;margin-top:8px;font-size:11px;background:rgba(255,255,255,0.06);padding:2px 6px;border-radius:4px;">theme: dark</code>
              </div>
            </div>
            <div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.07);border-radius:12px;overflow:hidden;">
              <div style="height:64px;background:#222725;"></div>
              <div style="padding:14px 16px;">
                <div style="font-size:15px;font-weight:600;color:#F7F7F2;margin-bottom:4px;">light</div>
                <div style="font-family:'SF Mono',monospace;font-size:12px;color:#B0B3AD;">#222725 accent on #F7F7F2 paper</div>
                <code style="display:inline-block;margin-top:8px;font-size:11px;background:rgba(255,255,255,0.06);padding:2px 6px;border-radius:4px;">theme: light</code>
              </div>
            </div>
          </div>

  - type: section
    eyebrow: Apply
    heading: Usage
    components:
      - type: code
        language: yaml
        code: |
          # kazam.yaml
          name: My Site
          theme: violet            # swap to any rainbow color
          texture: grid            # pairs with any theme
          glow: accent             # picks up the active accent
          nav:
            - label: Home
              href: index.html

      - type: markdown
        body: |
          Need a custom accent outside the stock set? Override any theme token directly — the named theme is just a starting point.

      - type: code
        language: yaml
        code: |
          # kazam.yaml
          theme: dark
          colors:
            accent: '#14B8B8'      # your brand color
            accent_soft: 'rgba(var(--accent-rgb), 0.08)'
