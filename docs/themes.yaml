                <div style="font-size:15px;font-weight:600;color:#F7F7F2;margin-bottom:4px;">dark</div>
                <div style="font-family:'SF Mono',monospace;font-size:12px;color:#B0B3AD;">#899878 · sage accent on #121113</div>
                <code style="display:inline-block;margin-top:8px;font-size:11px;background:rgba(255,255,255,0.06);padding:2px 6px;border-radius:4px;">theme: dark</code>
              </div>
