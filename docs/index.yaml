title: kazam — beautiful sites from simple YAML
shell: standard

components:
  - type: header
    title: kazam
    eyebrow: YAML → beautiful sites
    subtitle: One Rust binary. No framework, no npm, no runtime JS. Designed so AI agents can author your site end-to-end.

  - type: section
    eyebrow: Why
    heading: Markdown isn't enough. Next.js is too much.
    components:
      - type: markdown
        body: |
          Markdown was designed for humans typing prose. It renders plain pages — grey text on
          white, no cards, no badges, no interactive tables. That was fine when humans wrote
          all the content.

          Now LLMs write the content, and plain markdown wastes what's possible. The usual
          response is to reach for Next.js or a framework-backed docs tool — and inherit a
          thousand-package npm tree, a webpack build, a client runtime, and a supply chain
          you'll never audit.

          kazam is the middle path: **the format stays trivial to generate, but the output is
          genuinely beautiful — and it ships as pure HTML and CSS.** Structured components,
          LLM-friendly schema, themed, composable. No React. No framework. No runtime JS.
          One Rust binary.

  - type: section
    eyebrow: Receipts, not a pitch
    heading: What kazam replaces
    components:
      - type: markdown
        body: |
          A real personal site migrated from Create-React-App to kazam.
          Whole repo, not a hand-picked excerpt.

      - type: stat_grid
        columns: 3
        stats:
          - label: Hand-authored LOC
            value: "−88%"
            detail: 1,722 → 210
            color: green
          - label: npm dependencies
            value: "0"
            detail: was react, tailwind, axios, +1000s transitive
            color: green
          - label: Migration
            value: 1 conversation
            detail: one-shot rebuild
            color: default

      - type: before_after
        items:
          - title: Source you maintain
            before: 1,722 lines across React components, hooks, CSS modules, and Tailwind config.
            after: "**210 lines of YAML** — `kazam.yaml` + one file per page."
          - title: Dependency graph
            before: "react, react-router, axios, tailwind, react-gravatar, react-toggle + thousands of transitive npm packages you'll never audit."
            after: "**Zero npm dependencies.** ~10 direct Rust crates, `cargo-audit` in CI, `Cargo.lock` committed."
          - title: Build & deploy
            before: webpack build, Firebase Hosting, two cloud functions to patch over SPA quirks.
            after: "**One Rust binary** emits static HTML. Firebase Hosting serves `_site/` — no functions, no runtime."

  - type: section
    eyebrow: Use cases
    heading: What to build with it
    components:
      - type: card_grid
        cards:
          - title: Documentation sites
            badge:
              label: standard
              color: default
            description: API refs, guides, onboarding docs. Tabs for code samples, sortable tables for references.
            links:
              - label: See example →
                href: examples/doc.html

          - title: Internal KBs & wikis
            badge:
              label: standard
              color: default
            description: Handbooks, runbooks, service catalogs. Card grids for navigation, tables for operational data.
            links:
              - label: See example →
                href: examples/kb.html

          - title: Meeting agendas & briefs
            badge:
              label: document
              color: default
            description: One-pagers and pre-reads. Centered card layout, print-optimized, exports clean to PDF.
            links:
              - label: See example →
                href: examples/agenda.html

          - title: Decks & presentations
            badge:
              label: deck
              color: default
            description: QBRs, strategy reviews, pitch decks. Full-viewport slides with keyboard nav and PDF export.
            links:
              - label: See example →
                href: examples/deck.html

          - title: Dashboards from APIs
            badge:
              label: pattern
              color: teal
            description: Scripts emit YAML, kazam renders. Live data from HN, GitHub, Linear, Sheets, or any JSON endpoint.
            links:
              - label: See walkthrough →
                href: examples/hackernews.html
              - label: Live HN top 30 →
                href: examples/hackernews-live.html

          - title: Landing pages
            badge:
              label: standard
              color: default
            description: Hero, features, stats, testimonial, CTA. Not what kazam was built for — but if you need to ship one alongside your docs, it's a few components away.
            links:
              - label: See example →
                href: examples/landing.html

  - type: section
    eyebrow: 30 seconds
    heading: This YAML…
    components:
      - type: code
        language: yaml
        code: |
          title: Q2 Pipeline Review
          shell: standard

          components:
            - type: header
              title: Q2 Pipeline Review
              subtitle: Three active opportunities

            - type: stat_grid
              columns: 3
              stats:
                - label: Total ACV
                  value: $1.2M
                  color: green
                - label: Weighted
                  value: $480K
                  color: default
                - label: At risk
                  value: $200K
                  color: yellow

      - type: markdown
        body: "…renders to this:"

      - type: header
        title: Q2 Pipeline Review
        subtitle: Three active opportunities

      - type: stat_grid
        columns: 3
        stats:
          - label: Total ACV
            value: $1.2M
            color: green
          - label: Weighted
            value: $480K
