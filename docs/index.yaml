  - type: section
    eyebrow: Read more
    heading: Three ways in
    components:
      - type: card_grid
        cards:
          - title: Is it a fit?
            description: Use cases, the honest line on what kazam is not, and a real migration story.
            links:
              - label: See the fit →
                href: about.html

          - title: How does it work?
            description: The three orthogonal axes, the agent-first authoring model, and why static output has no JS supply chain.
