title: kazam — beautiful sites from simple YAML
shell: standard

components:
  - type: header
    title: kazam
    eyebrow: YAML → beautiful sites
    subtitle: An agent first approach to building static docs, knowledge bases, slides, and more.

  - type: section
    eyebrow: Use cases
    heading: What to build with it
    components:
      - type: card_grid
        cards:
          - title: Documentation sites
            badge:
              label: standard
              color: default
            description: API refs, guides, onboarding docs. Tabs for code samples, sortable tables for references.
            links:
              - label: See example →
                href: examples/doc.html

          - title: Internal KBs & wikis
            badge:
              label: standard
              color: default
            description: Handbooks, runbooks, service catalogs. Card grids for navigation, tables for operational data.
            links:
              - label: See example →
                href: examples/kb.html

          - title: Meeting agendas & briefs
            badge:
              label: document
              color: default
            description: One-pagers and pre-reads. Centered card layout, print-optimized, exports clean to PDF.
            links:
              - label: See example →
                href: examples/agenda.html

          - title: Decks & presentations
            badge:
              label: deck
              color: default
            description: QBRs, strategy reviews, pitch decks. Full-viewport slides with keyboard nav and PDF export.
            links:
              - label: See example →
                href: examples/deck.html

          - title: Dashboards from APIs
            badge:
              label: pattern
              color: teal
            description: Scripts emit YAML, kazam renders. Live data from HN, GitHub, Linear, Sheets, or any JSON endpoint.
            links:
              - label: See walkthrough →
                href: examples/hackernews.html
              - label: Live HN top 30 →
                href: examples/hackernews-live.html

          - title: Landing pages
            badge:
              label: standard
              color: default
            description: Hero, features, stats, testimonial, CTA. Not what kazam was built for — but if you need to ship one alongside your docs, it's a few components away.
            links:
              - label: See example →
                href: examples/landing.html

  - type: section
    eyebrow: Why
    heading: Markdown isn't enough anymore
    components:
      - type: markdown
        body: |
          Markdown was designed for humans typing prose. It renders plain pages. That was fine
          when humans wrote all the content.

          Now LLMs write the content. And a plain markdown render — grey text on white, no
          cards, no badges, no interactive tables — feels like a waste of what's possible.

          kazam is markdown's inverse: **the format is still trivial to generate, but the
          output is genuinely beautiful**. Components are structured (LLM-friendly), themed,
          and composable. No React. No framework. Single binary, zero runtime.

  - type: section
    eyebrow: 30 seconds
    heading: This YAML…
    components:
      - type: code
        language: yaml
        code: |
          title: Q2 Pipeline Review
          shell: standard

          components:
            - type: header
              title: Q2 Pipeline Review
              subtitle: Three active opportunities

            - type: stat_grid
              columns: 3
              stats:
                - label: Total ACV
                  value: $1.2M
                  color: green
                - label: Weighted
                  value: $480K
                  color: default
                - label: At risk
                  value: $200K
                  color: yellow

      - type: markdown
        body: "…renders to this:"

      - type: header
        title: Q2 Pipeline Review
        subtitle: Three active opportunities

      - type: stat_grid
        columns: 3
        stats:
          - label: Total ACV
            value: $1.2M
            color: green
          - label: Weighted
            value: $480K
            color: default
          - label: At risk
            value: $200K
            color: yellow

  - type: section
    eyebrow: Design
    heading: Three axes, orthogonal
    components:
      - type: columns
        equal_heights: true
        columns:
          - - type: callout
              variant: info
              title: Shell
              body: "**How** the page is chromed. Every shell shares a built-in nav bar (site name, eyebrow crumb, subtitle). `standard` adds nav links and flowing content, `document` adds a centered card optimized for print, `deck` adds full-viewport slides with keyboard nav and PDF export."
          - - type: callout
              variant: info
              title: Page
              body: "**What** the page is — just a title and an ordered list of components. Or for deck shell, a list of slides."
          - - type: callout
              variant: info
              title: Components
              body: "**Which** primitives compose the page. 17 typed components. Nesting for `section`, `tabs`, `columns`, `accordion`."
