title: kazam — beautiful sites from simple YAML
shell: standard

components:
  - type: header
    title: kazam
    eyebrow: YAML → beautiful sites
    subtitle: One Rust binary. No framework, no npm, no runtime JS. Designed so AI agents can author your site end-to-end.

  - type: section
    eyebrow: Why
    heading: Markdown isn't enough. Next.js is too much.
    components:
      - type: markdown
        body: |
          Markdown was designed for humans typing prose. It renders plain pages — grey text on
          white, no cards, no badges, no interactive tables. That was fine when humans wrote
          all the content.

          Now LLMs write the content, and plain markdown wastes what's possible. The usual
          response is to reach for Next.js or a framework-backed docs tool — and inherit a
          thousand-package npm tree, a webpack build, a client runtime, and a supply chain
          you'll never audit.

          kazam is the middle path: **the format stays trivial to generate, but the output is
          genuinely beautiful — and it ships as pure HTML and CSS.** Structured components,
          LLM-friendly schema, themed, composable. No React. No framework. No runtime JS.
          One Rust binary.

  - type: section
    eyebrow: Beyond docs
    heading: If it's a structured artifact, kazam makes it.
    components:
      - type: markdown
        body: |
          Slide decks, one-page briefs, landing pages, internal dashboards, API references —
          all the structured artifacts a team produces in a week, from the same typed
          components. The format LLMs generate correctly; the output you actually ship.

      - type: card_grid
        cards:
          - title: Agents can produce it
            description: Hand Claude a brief and get a populated deck, one-pager, or landing page back — edit-ready.
          - title: Output is the deliverable
            description: The HTML kazam writes is the HTML you ship. No PNG export, no CSS shim.
          - title: Git-versionable
            description: Every change is a diff in a PR. Review design the way you review code.

  - type: section
    eyebrow: 30 seconds
    heading: This YAML…
    components:
      - type: code
        language: yaml
        code: |
          title: Q2 Pipeline Review
          shell: standard

