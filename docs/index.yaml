title: kazam — the tool your coding agent didn't know it needed
shell: standard

components:
  - type: header
    title: kazam
    eyebrow: agent workspace + static site generator
    subtitle: Give your coding agent a persistent codebase index, structured task tracking, and a visual board — one Rust binary, no dependencies.

  - type: section
    eyebrow: Why
    heading: Three things your agent is missing
    components:
      - type: columns
        equal_heights: true
        columns:
          - - type: callout
              variant: info
              title: Tokens
              body: "Your agent explores with `find`, `grep`, and `ls` — burning hundreds of tokens per turn. kazam's two-tier anatomy index answers \"what's where\" in one read."
          - - type: callout
              variant: info
              title: Tracking
              body: Work disappears into terminal scroll. kazam gives agents structured tasks that survive sessions, compaction, and handoffs. Close after each commit — no batching.
          - - type: callout
              variant: info
              title: Visibility
              body: You're watching a terminal you can barely follow. kazam's visual board shows live task status, codebase anatomy, and activity at a glance.

      - type: stat_grid
        columns: 3
        stats:
          - label: Cost savings
            value: 45% cheaper
            color: green
          - label: Speed gain
            value: 48% faster
            color: green
          - label: Input tokens/turn
            value: 81–94% fewer
            color: green

  - type: section
    eyebrow: Setup
    heading: One command
    components:
      - type: code
        language: bash
        code: kazam workspace init --agent claude [--skunkworks]

      - type: markdown
        body: |
          That indexes your codebase, writes the agent rules file, and installs git hooks.
          Your agent picks up context automatically on the next session.

      - type: code
        language: bash
        code: kazam board

  - type: section
    eyebrow: Static sites
    heading: Beautiful artifacts from YAML
    components:
      - type: markdown
        body: |
          kazam also builds static sites — 30+ themed components, three shell types, zero runtime JS.
          The same binary that runs your workspace renders your docs, decks, and dashboards.

      - type: card_grid
        cards:
          - title: Documentation sites
            description: API refs, guides, onboarding docs. Tabs, sortable tables, card grids.
            links:
              - label: See example →
                href: examples/doc.html

          - title: Decks & presentations
            description: Full-viewport slides with keyboard nav and PDF export. QBRs, strategy reviews, pitch decks.
            links:
              - label: See example →
                href: examples/deck.html

          - title: Briefs & agendas
            description: Centered card layout, print-optimized. Exports cleanly to PDF.
            links:
              - label: See example →
                href: examples/brief.html

          - title: Dashboards from APIs
            description: Scripts emit YAML, kazam renders. Live-ish data from any JSON source, zero runtime.
            links:
              - label: See walkthrough →
                href: examples/hackernews.html

          - title: Landing pages
            description: Hero, features, stats, CTA — all native components. Ships pure HTML and CSS.
            links:
              - label: See example →
                href: examples/landing.html

  - type: section
    eyebrow: Get started
    heading: Pick your path
    components:
      - type: columns
        equal_heights: true
        columns:
          - - type: callout
              variant: info
              title: Agent workspace
              body: Set up codebase indexing, task tracking, and the visual board in any repo.
              links:
                - label: Workspace quickstart →
                  href: guide.html
                  variant: primary
          - - type: callout
              variant: info
              title: Static sites
              body: Build docs, decks, briefs, and dashboards from YAML — zero runtime JS.
              links:
                - label: Site quickstart →
                  href: guide.html
                  variant: primary
