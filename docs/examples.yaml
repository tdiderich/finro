title: Examples
shell: standard

components:
  - type: header
    title: Examples
    eyebrow: Showcase
    subtitle: Real sites built with finro. Click any tile to open the live page.

  - type: image
    src: assets/demo-dashboard.svg
    alt: Sample finro dashboard with three customer cards
    caption: The customer portfolio dashboard — a handful of lines of YAML produce this page.
    max_width: 640

  - type: section
    eyebrow: Technical Success Hub
    heading: A customer KB built from ~300 lines of YAML
    components:
      - type: markdown
        body: |
          A working knowledge base for a technical success team. Portfolio dashboard at
          the root, per-customer deployment guides, meeting agendas, and quarterly business
          reviews. Each page type uses a different shell.

      - type: card_grid
        cards:
          - title: Customer Portfolio
            badge:
              label: standard
              color: default
            description: Dashboard grid of customer cards with health badges and quick links.
            links:
              - label: View →
                href: ../examples/kb/_site/index.html

          - title: Deployment Phases
            badge:
              label: standard
              color: default
            description: Interactive 4-phase tracker. Click any phase to focus it.
            links:
              - label: View →
                href: ../examples/kb/_site/deployment-phases.html

          - title: Customer Detail
            badge:
              label: standard
              color: default
            description: Per-customer article with meta grid, health tables, and notes.
            links:
              - label: View →
                href: ../examples/kb/_site/customers/acme.html

          - title: Meeting Agenda
            badge:
              label: document
              color: default
            description: Centered card, teal-bordered header, print-optimized.
            links:
              - label: View →
                href: ../examples/kb/_site/agenda/acme.html

          - title: Q2 Business Review
            badge:
              label: deck
              color: default
            description: 3-slide deck. Arrow keys to navigate. Download PDF exports all slides.
            links:
              - label: View →
                href: ../examples/kb/_site/qbr/acme.html

          - title: This docs site
            badge:
              label: meta
              color: green
            description: These docs were built with finro. Every component demos itself.
            links:
              - label: You're here
                href: index.html

  - type: callout
    variant: info
    title: Want to replicate this?
    body: "The full source is at `examples/kb/` in the repo — 8 YAML files total, including the site config. Each file maps to one page of output."
