title: Wishes
shell: standard

components:
  - type: header
    title: Wishes
    eyebrow: New in v0.4.0
    subtitle: Answer a few questions, get a populated kazam YAML — either written directly by kazam or generated by your agent of choice.

  - type: section
    eyebrow: The flow
    heading: Three-part magic
    components:
      - type: markdown
        body: |
          A **wish** is a small markdown spec that says what questions to ask, what YAML to emit,
          and how to brief an agent to emit it well. kazam runs the interview itself so the questions
          are the same on every machine; the agent — if you pick one — handles the creative lifting.

      - type: columns
        equal_heights: true
        columns:
          - - type: callout
              variant: info
              title: 1. Interview
              body: "kazam asks 3–6 structured questions in your terminal. Same prompts regardless of which agent is behind it. Deterministic input capture, not a chatbot."
          - - type: callout
              variant: info
              title: 2. Generation
              body: "Without `--agent`: kazam renders a populated template. With `--agent`: answers are baked into one prompt and shelled out to `claude -p`, `gemini -p`, `codex exec`, or `opencode run`."
          - - type: callout
              variant: info
              title: 3. Edit
              body: "The output is a normal `.yaml` file. Open it, refine it, commit it. No lock-in, no hidden state, no schema you can't read."

  - type: section
    eyebrow: First wish
    heading: "kazam wish deck"
    components:
      - type: markdown
        body: |
          A 7-slide QBR / strategy-review deck. The questions cover the five things every
          honest QBR needs: topic, audience, timeframe, 2–3 wins, 1–2 misses, and the ask.
          The shell is `deck`, so you get keyboard navigation and PDF export for free.

      - type: code
        language: bash
        code: |
          kazam wish deck                          # kazam asks, kazam writes
          kazam wish deck --agent claude           # kazam asks, Claude writes
          kazam wish deck --stdout | your-agent    # portable markdown, any agent
          kazam wish deck --out quarterly.yaml     # pick the output path
          kazam wish list                          # see every wish

  - type: section
    eyebrow: Applications
    heading: First-class in every agent
    components:
      - type: markdown
        body: |
          No skill installer, no per-agent plugin format. kazam shells out to whichever agent
          CLI you have on your `$PATH` using its native non-interactive mode.

      - type: card_grid
        columns: 2
        cards:
          - title: "Claude Code"
            description: "`kazam wish deck --agent claude` — pipes the prompt to `claude -p`."
            color: default
          - title: "Gemini CLI"
            description: "`kazam wish deck --agent gemini` — pipes the prompt to `gemini -p`."
            color: default
          - title: "Codex"
            description: "`kazam wish deck --agent codex` — pipes the prompt to `codex exec`."
            color: default
          - title: "OpenCode"
            description: "`kazam wish deck --agent opencode` — pipes the prompt to `opencode run`."
            color: default
          - title: "Any other agent"
            badge:
              label: universal
              color: teal
            description: "`kazam wish deck --stdout` prints the portable wish markdown. Paste it into ChatGPT, Cursor, Aider, or any LLM context window."
            color: teal

  - type: section
    eyebrow: Roadmap
    heading: Eight wishes in eight weeks
    components:
      - type: markdown
        body: |
          `deck` ships with v0.4.0. One new wish every Friday for the following seven weeks,
          each one the Friday drop for a minor release.

      - type: timeline
        items:
          - name: "W1: deck"
            status: completed
          - name: "W2: brief"
            status: active
          - name: "W3: landing"
            status: upcoming
          - name: "W4: api-ref"
            status: upcoming
          - name: "W5: dashboard"
            status: upcoming
          - name: "W6: post-mortem"
            status: upcoming
          - name: "W7: resume"
            status: upcoming
          - name: "W8: roadmap"
            status: upcoming

      - type: steps
        numbered: true
        items:
          - title: "Week 1 — `kazam wish deck`"
            detail: "QBR / strategy-review deck (7 slides). Ships with v0.4.0."
          - title: "Week 2 — `kazam wish brief`"
            detail: "Incident brief / meeting agenda. Document shell, print-optimized."
          - title: "Week 3 — `kazam wish landing`"
            detail: "Indie-hacker landing page with hero, features, stats, CTA."
          - title: "Week 4 — `kazam wish api-ref`"
            detail: "OpenAPI-style endpoint documentation."
          - title: "Week 5 — `kazam wish dashboard`"
            detail: "Dashboard + `sync.sh` reference script. You own the fetcher; kazam ships zero connectors."
          - title: "Week 6 — `kazam wish post-mortem`"
            detail: "Structured incident post-mortem with timeline, impact, learnings."
          - title: "Week 7 — `kazam wish resume`"
            detail: "Personal CV / resume riff."
          - title: "Week 8 — `kazam wish roadmap`"
            detail: "Public product roadmap with timeline and status."

  - type: section
    eyebrow: Next
    components:
      - type: callout
        variant: info
        title: Next up → Components
        body: Browse the component catalog to see what the rendered output can look like. `kazam agents` prints the full authoring guide, and any agent with `-p` mode can write a kazam site from it.
