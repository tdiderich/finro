title: Customer Health Dashboard
shell: standard
eyebrow: Customer Success
subtitle: Portfolio health — Q2 2026

components:
  - type: stat_grid
    columns: 4
    stats:
      - label: Total Customers
        value: "142"
        detail: Active accounts
      - label: Healthy
        value: "118"
        detail: Green — on track
        color: green
      - label: At Risk
        value: "19"
        detail: Yellow — needs attention
        color: yellow
      - label: Critical
        value: "5"
        detail: Red — escalation required
        color: red

  - type: callout
    variant: danger
    title: 5 accounts require immediate escalation
    body: |
      Acme Corp, Bluestone, Harrow Medical, Pinnacle Logistics, and Vantage
      Systems are all overdue on support SLAs and have not logged in within
      the past 14 days. Assign owners and initiate outreach today.

  - type: section
    eyebrow: Portfolio
    heading: Account health by customer
    components:
      - type: card_grid
        min_width: 280
        cards:
          - title: Acme Corp
            badge:
              label: Critical
              color: red
            description: Enterprise — AWS — $420K ARR
            links:
              - label: View account
                href: /accounts/acme
          - title: Bluestone Inc
            badge:
              label: Critical
              color: red
            description: Mid-market — GCP — $180K ARR
            links:
              - label: View account
                href: /accounts/bluestone
          - title: Northwind Co
            badge:
              label: Healthy
              color: green
            description: Enterprise — Azure — $310K ARR
            links:
              - label: View account
                href: /accounts/northwind
          - title: Riverdale Tech
            badge:
              label: At Risk
              color: yellow
            description: SMB — AWS — $72K ARR
            links:
              - label: View account
                href: /accounts/riverdale

  - type: section
    eyebrow: Detail
    heading: All accounts
    components:
      - type: table
        filterable: true
        sortable: true
        columns:
          - key: account
            label: Account
          - key: tier
            label: Tier
          - key: arr
            label: ARR
          - key: health
            label: Health
          - key: last_login
            label: Last Login
          - key: csm
            label: CSM
        rows:
          - account: Acme Corp
            tier: Enterprise
            arr: "$420K"
            health: Critical
            last_login: "18 days ago"
            csm: Sam T.
          - account: Northwind Co
            tier: Enterprise
            arr: "$310K"
            health: Healthy
            last_login: "2 days ago"
            csm: Jordan M.
          - account: Bluestone Inc
            tier: Mid-market
            arr: "$180K"
            health: Critical
            last_login: "21 days ago"
            csm: Priya K.
          - account: Riverdale Tech
            tier: SMB
            arr: "$72K"
            health: At Risk
            last_login: "9 days ago"
            csm: Sam T.
          - account: Harrow Medical
            tier: Enterprise
            arr: "$540K"
            health: Critical
            last_login: "15 days ago"
            csm: Jordan M.

  - type: section
    eyebrow: Activity
    heading: Recent events
    components:
      - type: event_timeline
        default_filter: major
        show_filter_toggle: true
        limit: 10
        events:
          - date: 2026-04-29
            severity: major
            title: Acme Corp — support SLA breached (P1 ticket #4821)
            summary: |
              Ticket open 48 hours with no engineer response. Escalated to VP
              Engineering. Customer contacted by CSM.
            source: linear
          - date: 2026-04-28
            severity: major
            title: Bluestone Inc — no login in 21 days, renewal at risk
            summary: |
              Automated health check flagged zero session activity since Apr 7.
              Renewal is June 15. CSM Priya assigned outreach task.
          - date: 2026-04-27
            severity: minor
            title: Northwind Co — analytics pilot hit 50-query milestone
          - date: 2026-04-26
            severity: info
            title: Riverdale Tech — new user seat provisioned (8 → 9 seats)
          - date: 2026-04-25
            severity: major
            title: Harrow Medical — procurement escalated timeline concern
            summary: |
              Procurement lead flagged a Q2 budget freeze. Renewal is May 31.
              Account team to schedule exec sync.

  - type: section
    eyebrow: Coverage
    heading: CSM workload
    components:
      - type: progress_bar
        value: 83
        label: Sam T. — capacity
        color: yellow
        detail: 42 of 50 accounts at healthy cadence
      - type: progress_bar
        value: 91
        label: Jordan M. — capacity
        color: green
        detail: 46 of 50 accounts at healthy cadence
      - type: progress_bar
        value: 60
        label: Priya K. — capacity
        color: red
        detail: 30 of 50 accounts at healthy cadence
