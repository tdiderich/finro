          - service: notification-worker
            owner: Platform
            uptime: 99.99%
            errors: 0.01%
            oncall: Maya C.
          - service: search
            owner: Discovery
            uptime: 99.71%
            errors: 0.42%
            oncall: Priya S.
          - service: image-processor
            owner: Media
            uptime: 99.85%
            errors: 0.07%
            oncall: Dev M.
          - service: billing-worker
            owner: Payments
            uptime: 99.94%
