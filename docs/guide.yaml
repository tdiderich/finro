title: Get Started
shell: standard

components:
  - type: header
    title: Get Started
    eyebrow: 60 seconds
    subtitle: Install the binary, then pick your path — agent workspace or static sites.

  - type: section
    eyebrow: Install
    heading: Get the binary
    components:
      - type: markdown
        body: |
          kazam is a single self-contained Rust binary. No runtime, no Node,
          no Python. Pick whichever install method is convenient — all three
          land the same binary on your `PATH`.

      - type: tabs
        tabs:
          - label: Homebrew
            components:
              - type: markdown
                body: |
                  Easiest on macOS / Linux. Pulls from the `tdiderich/tap` tap.
              - type: code
                language: bash
                code: |
                  brew install tdiderich/tap/kazam
                  kazam --version

          - label: cargo install
            components:
              - type: markdown
                body: |
                  Works on any system with a Rust toolchain. Installed to
                  `~/.cargo/bin/kazam`.
              - type: code
                language: bash
                code: |
                  cargo install kazam
                  kazam --version

              - type: markdown
                body: |
                  **Bleeding edge:** install straight from `main` to pick up
                  unreleased fixes.
              - type: code
                language: bash
                code: |
                  cargo install --git https://github.com/tdiderich/kazam

          - label: From source
            components:
              - type: markdown
                body: |
                  For development or if you want to pin to a specific branch
                  or commit.
              - type: code
                language: bash
                code: |
                  git clone https://github.com/tdiderich/kazam
                  cd kazam
                  cargo build --release
                  cp target/release/kazam /usr/local/bin/kazam

  - type: section
    eyebrow: Two paths
    heading: What are you building?
    components:
      - type: tabs
        tabs:
          - label: Agent workspace
            components:
              - type: markdown
                body: |
                  Give your coding agent persistent codebase context, task tracking, and a visual board.
              - type: code
                language: bash
                code: |
                  cd your-repo && kazam workspace init --agent claude
              - type: markdown
                body: |
                  That's it. Your agent now reads the codebase index instead of running find/grep,
                  tracks work with `kazam track`, and logs activity. Open the board in a separate terminal:
              - type: code
                language: bash
                code: |
                  kazam board
              - type: callout
                variant: info
                title: Next up
                body: The workspace guide covers anatomy, tracking, hooks, corrections, and benchmarks in detail.
                links:
                  - label: Workspace guide →
                    href: workspace.html
                    variant: primary

          - label: Static sites
            components:
              - type: markdown
                body: |
                  Build beautiful static sites from YAML — 30+ themed components, zero runtime JS.
              - type: code
                language: bash
                code: |
                  kazam init my-site && cd my-site && kazam dev .
              - type: markdown
                body: |
                  Edit `index.yaml` — the browser reloads on save. That's the loop.
              - type: code
                language: bash
                code: |
                  kazam build . --out dist --release
              - type: callout
                variant: info
                title: Or let your agent write it
                body: "Run `kazam wish deck --yolo` and your agent scaffolds and populates the whole site for you."
                links:
                  - label: Read the wishes guide →
                    href: wishes.html
                    variant: primary
              - type: callout
                variant: info
                title: Next up
                body: The site guide walks through shells, components, and kazam.yaml config.
                links:
                  - label: Site guide →
                    href: about.html
                    variant: primary
