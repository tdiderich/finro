      ## Overview

      Acme Corp is running **Maze Enterprise** on their AWS infrastructure, deployed in Q1 2026 after a 6-week onboarding process.

      ## Architecture

      - **Cloud Provider**: AWS us-east-1
      - **Auth Method**: SAML SSO via Okta
      - **Deployment Type**: SaaS multi-tenant

      ## Health Status

      | Metric | Value | Notes |
      |--------|-------|-------|
      | Uptime | 99.9% | Above SLA |
      | Active Users | 47 | Growing MoM |
      | Open Tickets | 2 | Minor issues |
      | Scan Coverage | 94% | On track |

      ## Open Items

      1. Configure automated scanning for new AWS sub-accounts
      2. Enable Slack integration for alert routing
      3. Schedule Q2 business review

      > Champion is Sarah M. (VP Engineering). Executive sponsor is the CTO. Renewal in October 2026.
