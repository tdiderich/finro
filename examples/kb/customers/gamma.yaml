      ## Overview

      Gamma Inc signed in March 2026. Onboarding is scheduled to begin in May 2026.

      ## Architecture

      - **Cloud Provider**: GCP us-central1
      - **Auth Method**: Google Workspace SSO (OIDC)
      - **Deployment Type**: SaaS multi-tenant

      ## Pre-Onboarding Checklist

      1. Confirm GCP project IDs with IT team
      2. Set up Google Workspace SSO integration
      3. Identify champion and executive sponsor
      4. Schedule kickoff call for May 5, 2026

      > New logo — referred by Acme Corp. Champion TBD, initial contact is procurement lead Jordan K.
