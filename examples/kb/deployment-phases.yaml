title: Full Scale Deployment
shell: standard

components:
  - type: header
    title: Full Scale Deployment
    eyebrow: Reference

  - type: selectable_grid
    interaction: single_select
    connector: dots_line
    cards:
      - eyebrow: Phase 1
        title: Planning
        bullets:
          - Key use cases defined
          - Short-term and long-term success metrics established
          - General workflows for the team outlined
          - Ownership of the deployment understood

      - eyebrow: Phase 2
        title: Initial Configuration
        bullets:
          - Review the Maze dashboard and understand key features
          - Walk through sample workflows to understand AI screening
          - Configure initial screening assessments

      - eyebrow: Phase 3
        title: Optimization & Automation
        bullets:
          - All integrations fully configured
          - Maze investigations aligned with the team's workflow
          - All users trained on Maze

      - eyebrow: Phase 4
        title: Ongoing Engagement
        bullets:
          - Continued use case expansion
          - Feature request and roadmap alignment
